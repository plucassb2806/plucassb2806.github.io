<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Planner Diário</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: #e2e8f0;
  display: flex;
  justify-content: center;
}

.wrap {
  width: 420px;
  padding: 20px;
}

.nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

button {
  cursor: pointer;
}

.nav-btn {
  background: transparent;
  border: 1px solid #334155;
  padding: 5px 10px;
  border-radius: 8px;
  color: #94a3b8;
}

.prog-bar {
  height: 6px;
  background: #1e293b;
  border-radius: 10px;
  margin-top: 10px;
  overflow: hidden;
}

.prog-fill {
  height: 100%;
  width: 0%;
  background: #22c55e;
  transition: 0.4s;
}

.card {
  background: #1e293b;
  padding: 12px;
  border-radius: 12px;
  margin-top: 10px;
  border: 1px solid #334155;
}

.card.done {
  background: linear-gradient(135deg, #052e16, #14532d);
  border-color: #22c55e;
}

.check-btn {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  border: 2px solid #64748b;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

.check-btn.done {
  background: #22c55e;
  border-color: #22c55e;
}

.edit {
  display: none;
  margin-top: 8px;
}

.edit input {
  width: 100%;
  margin-bottom: 5px;
}

.add-btn {
  margin-top: 10px;
  width: 100%;
  padding: 8px;
  background: #22c55e;
  border: none;
  border-radius: 10px;
  color: black;
}

</style>
</head>

<body>

<div class="wrap">

<div class="nav">
  <button class="nav-btn" onclick="changeDay(-1)">←</button>
  <div id="date"></div>
  <button class="nav-btn" onclick="changeDay(1)">→</button>
</div>

<div id="progress-text"></div>
<div class="prog-bar"><div class="prog-fill" id="progress"></div></div>

<div id="tasks"></div>

<button class="add-btn" onclick="addTask()">+ Nova meta</button>

</div>

<script>
let offset = 0;

function getDate() {
  const d = new Date();
  d.setDate(d.getDate() + offset);
  return d.toISOString().split("T")[0];
}

function load() {
  return JSON.parse(localStorage.getItem("planner") || "{}");
}

function save(data) {
  localStorage.setItem("planner", JSON.stringify(data));
}

function changeDay(n) {
  offset += n;
  render();
}

function addTask() {
  const data = load();
  const d = getDate();

  if (!data[d]) data[d] = [];

  data[d].push({
    id: Date.now(),
    title: "Nova meta",
    done: false
  });

  save(data);
  render();
}

function toggle(id) {
  const data = load();
  const d = getDate();

  data[d] = data[d].map(t => {
    if (t.id === id) t.done = !t.done;
    return t;
  });

  save(data);
  render();
}

function editTask(id, newTitle) {
  const data = load();
  const d = getDate();

  data[d] = data[d].map(t => {
    if (t.id === id) t.title = newTitle;
    return t;
  });

  save(data);
  render();
}

function render() {
  const data = load();
  const d = getDate();
  const list = data[d] || [];

  document.getElementById("date").innerText = d;

  const tasksDiv = document.getElementById("tasks");
  tasksDiv.innerHTML = "";

  let done = 0;

  list.forEach(task => {
    if (task.done) done++;

    const div = document.createElement("div");
    div.className = "card" + (task.done ? " done" : "");

    div.innerHTML = `
      <div style="display:flex; gap:10px;">
        <div class="check-btn ${task.done ? "done" : ""}" onclick="toggle(${task.id})">✓</div>
        <div style="flex:1">
          <div onclick="this.nextElementSibling.style.display='block'">
            ${task.title}
          </div>
          <div class="edit">
            <input id="edit-${task.id}" value="${task.title}">
            <button onclick="editTask(${task.id}, document.getElementById('edit-${task.id}').value)">Salvar</button>
          </div>
        </div>
      </div>
    `;

    tasksDiv.appendChild(div);
  });

  const percent = list.length ? Math.round((done / list.length) * 100) : 0;

  document.getElementById("progress").style.width = percent + "%";
  document.getElementById("progress-text").innerText = done + " / " + list.length;
}

render();
</script>

</body>
</html>
