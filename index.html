<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planner Diário</title>

<style>
:root {
  --bg: #0b0f14;
  --panel: #111827;
  --panel-2: #020617;
  --border: #374151;
  --text: #e5e7eb;
  --muted: #9ca3af;
  --green: #16a34a;
  --green-dark: #052e16;
  --btn: #111827;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Inter, Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  justify-content: center;
}

.wrap {
  width: min(760px, 100%);
  padding: 28px;
}

.nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
}

.nav-btn {
  background: var(--btn);
  border: 1px solid var(--border);
  padding: 10px 14px;
  border-radius: 12px;
  color: #d1d5db;
  cursor: pointer;
}

.date {
  text-align: center;
  flex: 1;
  font-size: 20px;
  font-weight: 600;
  line-height: 1.15;
}

.sub {
  font-size: 12px;
  color: var(--muted);
  margin-top: 4px;
}

.prog-bar {
  height: 6px;
  background: var(--panel);
  border-radius: 999px;
  margin: 10px 0 18px;
  overflow: hidden;
}

.prog-fill {
  height: 100%;
  width: 0%;
  background: var(--green);
  transition: width .2s ease;
}

#progress-text {
  color: var(--muted);
  font-size: 14px;
}

.card {
  background: var(--panel);
  padding: 18px;
  border-radius: 16px;
  margin-top: 14px;
  border: 1px solid var(--border);
}

.card.done {
  background: var(--green-dark);
  border-color: var(--green);
}

.row {
  display: flex;
  gap: 12px;
  align-items: flex-start;
}

.check-btn {
  width: 26px;
  height: 26px;
  min-width: 26px;
  border-radius: 50%;
  border: 2px solid #6b7280;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  user-select: none;
  margin-top: 2px;
}

.check-btn.done {
  background: var(--green);
  border-color: var(--green);
}

.content {
  flex: 1;
}

.tag {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}

.title {
  font-size: 16px;
  font-weight: 600;
  line-height: 1.35;
}

.area {
  font-size: 13px;
  color: var(--muted);
  margin-top: 4px;
  line-height: 1.35;
}

.edit {
  display: none;
  margin-top: 12px;
}

.edit input {
  width: 100%;
  margin-bottom: 8px;
  padding: 10px 12px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--panel-2);
  color: white;
  outline: none;
}

.actions {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}

.actions button {
  padding: 8px 12px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
  font-weight: 600;
}

.save-btn {
  background: var(--green);
  color: #06240f;
}

.cancel-btn {
  background: #374151;
  color: white;
}

.delete-btn {
  background: #7f1d1d;
  color: white;
}

.add-btn {
  margin-top: 20px;
  width: 100%;
  padding: 13px;
  background: var(--green);
  border: none;
  border-radius: 14px;
  color: #061b0c;
  font-weight: 800;
  cursor: pointer;
}

.empty {
  margin-top: 18px;
  padding: 18px;
  border-radius: 16px;
  border: 1px dashed var(--border);
  color: var(--muted);
  text-align: center;
  background: rgba(255,255,255,0.02);
}
</style>
</head>
<body>

<div class="wrap">
  <div class="nav">
    <button class="nav-btn" onclick="changeDay(-1)">← anterior</button>
    <div class="date">
      <div id="date"></div>
      <div class="sub" id="date-sub"></div>
    </div>
    <button class="nav-btn" onclick="changeDay(1)">próximo →</button>
  </div>

  <div id="progress-text"></div>
  <div class="prog-bar"><div class="prog-fill" id="progress"></div></div>

  <div id="tasks"></div>

  <button class="add-btn" onclick="addTask()">+ Nova meta</button>
</div>

<script>
let offset = 0;

const dias = ["domingo", "segunda", "terça", "quarta", "quinta", "sexta", "sábado"];
const meses = ["jan", "fev", "mar", "abr", "mai", "jun", "jul", "ago", "set", "out", "nov", "dez"];

function pad(n) {
  return String(n).padStart(2, "0");
}

function localDateKey(date) {
  return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}`;
}

function getDateObj() {
  const d = new Date();
  d.setDate(d.getDate() + offset);
  return d;
}

function formatDate(d) {
  return `${dias[d.getDay()]}, ${d.getDate()} de ${meses[d.getMonth()]}`;
}

function load() {
  try {
    return JSON.parse(localStorage.getItem("planner") || "{}");
  } catch {
    return {};
  }
}

function save(data) {
  localStorage.setItem("planner", JSON.stringify(data));
}

function changeDay(n) {
  offset += n;
  render();
}

function addTask() {
  const data = load();
  const key = localDateKey(getDateObj());

  if (!data[key]) data[key] = [];

  data[key].push({
    id: Date.now(),
    tag: "META",
    title: "Nova meta",
    area: "Foco / Área",
    done: false
  });

  save(data);
  render();
}

function toggle(id) {
  const data = load();
  const key = localDateKey(getDateObj());
  const list = data[key] || [];

  data[key] = list.map(task => task.id === id ? { ...task, done: !task.done } : task);

  save(data);
  render();
}

function editTask(id) {
  const tagEl = document.getElementById(`tag-${id}`);
  const titleEl = document.getElementById(`title-${id}`);
  const areaEl = document.getElementById(`area-${id}`);

  if (!tagEl || !titleEl || !areaEl) return;

  const data = load();
  const key = localDateKey(getDateObj());
  const list = data[key] || [];

  data[key] = list.map(task => {
    if (task.id === id) {
      return {
        ...task,
        tag: tagEl.value.trim() || "META",
        title: titleEl.value.trim() || "Nova meta",
        area: areaEl.value.trim() || "Foco / Área"
      };
    }
    return task;
  });

  save(data);
  render();
}

function deleteTask(id) {
  const data = load();
  const key = localDateKey(getDateObj());
  const list = data[key] || [];

  data[key] = list.filter(task => task.id !== id);

  save(data);
  render();
}

function openEditor(id) {
  const panel = document.getElementById(`edit-${id}`);
  if (panel) panel.style.display = "block";
}

function closeEditor(id) {
  const panel = document.getElementById(`edit-${id}`);
  if (panel) panel.style.display = "none";
}

function render() {
  const data = load();
  const dObj = getDateObj();
  const key = localDateKey(dObj);
  const list = data[key] || [];

  document.getElementById("date").innerText = formatDate(dObj);
  document.getElementById("date-sub").innerText = offset === 0 ? "hoje" : "";

  const tasksDiv = document.getElementById("tasks");
  tasksDiv.innerHTML = "";

  let done = 0;

  if (list.length === 0) {
    tasksDiv.innerHTML = `<div class="empty">Nenhuma meta criada para este dia.</div>`;
  }

  list.forEach(task => {
    if (task.done) done++;

    const card = document.createElement("div");
    card.className = "card" + (task.done ? " done" : "");
    card.innerHTML = `
      <div class="row">
        <div class="check-btn ${task.done ? "done" : ""}" onclick="toggle(${task.id})">✓</div>
        <div class="content">
          <div onclick="openEditor(${task.id})" style="cursor:pointer">
            <div class="tag">${task.tag}</div>
            <div class="title">${task.title}</div>
            <div class="area">${task.area}</div>
          </div>

          <div class="edit" id="edit-${task.id}">
            <input id="tag-${task.id}" value="${escapeHtml(task.tag)}" placeholder="Meta / categoria">
            <input id="title-${task.id}" value="${escapeHtml(task.title)}" placeholder="Meta">
            <input id="area-${task.id}" value="${escapeHtml(task.area)}" placeholder="Foco / Área">
            <div class="actions">
              <button class="save-btn" onclick="editTask(${task.id})">Salvar</button>
              <button class="cancel-btn" onclick="closeEditor(${task.id})">Cancelar</button>
              <button class="delete-btn" onclick="deleteTask(${task.id})">Excluir</button>
            </div>
          </div>
        </div>
      </div>
    `;

    tasksDiv.appendChild(card);
  });

  const percent = list.length ? Math.round((done / list.length) * 100) : 0;
  document.getElementById("progress").style.width = percent + "%";
  document.getElementById("progress-text").innerText = `${done} / ${list.length}`;
}

function escapeHtml(str) {
  return String(str)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#39;");
}

render();
</script>

</body>
</html>
